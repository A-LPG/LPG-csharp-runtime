name: Publish NuGet

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Pack
        working-directory: LPG2.Runtime
        run: |
          # Two csproj files live here; pin the SDK library project.
          dotnet pack LPG2.Runtime.csproj -c Release -o "$RUNNER_TEMP/nuget-out"
      - name: Push
        if: ${{ secrets.NUGET_API_KEY != '' }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "$RUNNER_TEMP/nuget-out"/*.nupkg \
            -k "$NUGET_API_KEY" \
            -s https://api.nuget.org/v3/index.json \
            --skip-duplicate
      - name: Skip notice
        if: ${{ secrets.NUGET_API_KEY == '' }}
        run: echo "NUGET_API_KEY not set; pack-only."
