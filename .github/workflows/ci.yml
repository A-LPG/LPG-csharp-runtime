name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build
        working-directory: LPG2.Runtime
        run: |
          # Two csproj files live here; pin the SDK library project and build
          # both TargetFrameworks (netstandard2.0;net8.0).
          dotnet build LPG2.Runtime.csproj -c Release
